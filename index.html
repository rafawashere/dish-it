<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DishIt!</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1>🍽️ DishIt!</h1>
        <p>Never wonder what's for dinner again.</p>
    </header>

    <main>
        <section id="meals-section">
            <button id="addMealBtn">+ Add Meal</button>

            <div id="mealList"></div>
        </section>

        <section id="settings-section">
            <h2>Settings</h2>

            <label>
                No Repeat Days
                <input id="noRepeatDays" type="number">
            </label>

            <button id="exportBtn">Export JSON</button>

            <input id="importFile" type="file">
        </section>
    </main>

    <script type="module" src="./js/app.js"></script>

</body>
</html>
